name: Smoke Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke test
        run: node scripts/smoke-test.mjs

      - name: Simulate player profiles
        run: node scripts/simulate-players.mjs --sessions 10 --seed bloco-br-beta --ci
