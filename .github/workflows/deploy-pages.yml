name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://thiago789.github.io/bloco-br/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Run local smoke test
        run: node scripts/smoke-test.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Retry GitHub Pages deploy
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run published smoke test
        run: node scripts/smoke-test.mjs --url "https://thiago789.github.io/bloco-br/" --wait-fresh
